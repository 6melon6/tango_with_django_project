{% extends "base.html" %}

{% block title %}Delete Food{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow">
      <div class="card-body">
        <h3 class="mb-3">Delete Food</h3>

        <p class="mb-4">
          Are you sure you want to delete
          <strong>{{ food.food_name }}</strong>?
        </p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger" aria-label="Delete this food item permanently"> Delete Food Item</button>
            <a class="btn btn-outline-secondary" href="{% url 'food_list' %}">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
